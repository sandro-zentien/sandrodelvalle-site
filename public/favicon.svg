<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#080c10"/>

  <!-- Subtle blue border -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="5.5"
        fill="none" stroke="#00aaff" stroke-width="0.75" stroke-opacity="0.35"/>

  <!-- HUD corner brackets -->
  <path d="M3 8 L3 3 L8 3"    fill="none" stroke="#00aaff" stroke-width="1.2" stroke-opacity="0.65" stroke-linecap="square"/>
  <path d="M24 3 L29 3 L29 8" fill="none" stroke="#00aaff" stroke-width="1.2" stroke-opacity="0.65" stroke-linecap="square"/>
  <path d="M29 24 L29 29 L24 29" fill="none" stroke="#00aaff" stroke-width="1.2" stroke-opacity="0.65" stroke-linecap="square"/>
  <path d="M8 29 L3 29 L3 24" fill="none" stroke="#00aaff" stroke-width="1.2" stroke-opacity="0.65" stroke-linecap="square"/>

  <!-- S -->
  <text x="16" y="22"
        font-family="'Courier New', Courier, monospace"
        font-size="19"
        font-weight="700"
        fill="#00aaff"
        text-anchor="middle"
        filter="url(#glow)">S</text>
</svg>
